<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Framer IA clone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        font-family: Oswald, "Courier New", Courier, monospace;
      }

      .info {
        transform: scale(0.8) translateY(80px);
        opacity: 0;
        transition: all 0.8s ease;
      }

      .info-animation-show {
        transform: scale(1.2) translateY(0);
        opacity: 1;
      }
    </style>
  </head>
  <body
    class="w-dvw h-screen bg-black relative text-white flex-col justify-center items-center overflow-x-hidden"
  >
    <header
      class="fixed w-full h-12 inline-flex flex-row justify-between items-center py-7 px-6"
    >
      <!--icono de framer-->
      <div class="inline-flex flex-row justify-center items-center">
        <img
          src="./assests/framer/framer.svg"
          alt="framer icon"
          class="w-11 h-auto object-cover"
        />
        <span class="text-[14px] font-mono">Framer</span>
      </div>
      <nav class="ml-8 items-center justify-center inline-flex">
        <ul class="h-full inline-flex justify-center items-center gap-12">
          <li class="text-[14px] font-mono">Product</li>
          <li class="text-[14px] font-mono">Community</li>
          <li class="text-[14px] font-mono">Resources</li>
          <li class="text-[14px] font-mono">Enterprise</li>
          <li class="text-[14px] font-mono">Pricing</li>
        </ul>
      </nav>

      <div class="inline-flex flex-row gap-4 justify-center items-center">
        <button
          class="px-3 py-2 font-mono text-[12px] text-white bg-black rounded-[6px]"
        >
          Login
        </button>
        <button
          class="px-3 py-2 font-mono text-[12px] text-black bg-white rounded-[6px]"
        >
          Sign Up
        </button>
      </div>
    </header>
    <!--seccion de chat de IA-->
    <section
      id="chat"
      class="absolute top-1/4 left-1/2 -translate-x-1/2 w-4/5 inline-flex flex-col items-center h-96 z-0"
    >
      <h2 class="text-5xl font-normal text-center">The web design agent</h2>
      <p class="text-center text-4xl opacity-60">for professional sites</p>
      <!--chat IA-->
      <textarea
        style="resize: none"
        class="bg-[#161616] size-[50%] rounded-t-xl text-white/70 mt-8 border border-[#323232] focus:border-gray-700 focus:outline-none placeholder:text-white/70 font-sans text-sm p-4"
        placeholder="Preguntar a la IA..."
        aria-placeholder="Preguntar a la IA.."
      >
      </textarea>
      <label
        class="w-[50%] h-6 border-t-1 inline-flex justify-between items-center border border-b rounded-b-xl border-[#323232] py-5 px-4 bg-[#161616]"
      >
        <span class="font-sans text-[12px]">GPT 5.5</span>
        <button
          class="bg-white/90 size-5 0 inline-flex justify-center items-center rounded-[4px]"
        >
          <img
            src="./assests/framer/arrow-up.svg"
            class="w-3 h-auto object-cover"
            alt="submit icon"
          />
        </button>
      </label>
      <div class="inline-flex flex-row justify-center mt-2 gap-5">
        <button
          class="text-[12px] font-sans text-white text-center p-1 border border-[#2f2f2f] rounded-[8px] bg-[#161616]"
        >
          Create personal portfolio
        </button>
        <button
          class="text-[12px] font-sans text-white text-center p-1 border border-[#2f2f2f] rounded-[8px] bg-[#161616]"
        >
          Build startup site
        </button>
        <button
          class="text-[12px] font-sans text-white text-center p-1 border border-[#2f2f2f] rounded-[8px] bg-[#161616]"
        >
          Launch landing page
        </button>
        <button
          class="text-[12px] font-sans text-white text-center p-1 border border-[#2f2f2f] rounded-[8px] bg-[#161616]"
        >
          Start company blog
        </button>
      </div>
      <!--seccion de labels o de inputs-->
      <div></div>
    </section>

    <article class="h-[calc(100vh-20%)]"></article>
    <!--seccion de infoamcion y demas-->
    <article
      id="info"
      class="info relative w-full h-auto inline-flex justify-center items-center z-10"
    >
      <img
        src="./assests/framer/info.png"
        alt="framer info"
        class="w-[50%] h-auto object-cover"
      />
    </article>
    <article class="h-[calc(100vh-80%)]"></article>

    <script>
      const observer = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              entry.target.classList.add("info-animation-show");
            } else {
              entry.target.classList.remove("info-animation-show");
            }
          });
        },
        {
          threshold: 0.5,
        },
      );

      observer.observe(document.getElementById("info"));
    </script>
  </body>
</html>
